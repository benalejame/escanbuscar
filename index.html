<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EscŠner El Corte Inglťs</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        #reader {
            width: 90%;
            max-width: 450px;
            border: 3px solid #00A86B; /* Verde El Corte Inglťs */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }
        #status {
            margin-top: 20px;
            font-size: 1rem;
            color: #a0a0a0;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>Listo para escanear cůdigo EAN</h1>
    <div id="reader"></div>
    <div id="status">Iniciando cŠmara trasera automŠticamente...</div>

    <script>
        // Instanciamos el lector apuntando al div "reader"
        const html5QrCode = new Html5Qrcode("reader");

        // Configuraciůn del escaneo
        const config = { 
            fps: 15, 
            qrbox: { width: 280, height: 130 }, // Formato rectangular para cůdigos de barras
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.EAN_13, 
                Html5QrcodeSupportedFormats.EAN_8 
            ]
        };

        // Funciůn que se ejecuta al detectar con ťxito un cůdigo
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('status').innerText = `EAN Detectado: ${decodedText}\nRedirigiendo...`;
            
            // Apagamos la cŠmara
            html5QrCode.stop().then(() => {
                const urlDestino = `https://www.elcorteingles.es/search-nwx/1/?s=${encodeURIComponent(decodedText)}`;
                
                // Forzar apertura en Chrome si es Android, o redirigir en la misma pestaŮa
                const isAndroid = /Android/i.test(navigator.userAgent);
                if (isAndroid) {
                    window.location.href = `googlechrome://nav?url=${encodeURIComponent(urlDestino)}`;
                } else {
                    window.location.href = urlDestino;
                }
            }).catch(err => {
                console.error("Error al detener la cŠmara", err);
            });
        }

        // Iniciar la cŠmara automŠticamente al cargar la pŠgina
        // { facingMode: "environment" } fuerza al navegador a usar la cŠmara trasera principal
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).then(() => {
            document.getElementById('status').innerText = "Escanea un cůdigo de barras...";
        }).catch(err => {
            document.getElementById('status').innerText = "Error: Asegķrate de estar usando HTTPS y permitir el acceso a la cŠmara.";
            console.error("Error al iniciar cŠmara:", err);
        });
    </script>
</body>
</html>
